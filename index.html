<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACM 赛事排期系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        .timeline-dot::before {
            content: ''; position: absolute; left: -21px; top: 6px; width: 10px; height: 10px; border-radius: 50%;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex overflow-hidden">
    
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col z-10 shadow-sm">
        <div class="p-6">
            <h1 class="text-xl font-black text-slate-900 tracking-tight">ACM Schedule</h1>
            <p class="text-xs text-slate-500 mt-1">Focus on coding.</p>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <button id="nav-calendar" class="w-full flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 rounded-xl text-sm font-bold transition-all">
                📅 个人日历模式
            </button>
            <button id="nav-report" class="w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-bold transition-all group">
                📊 年度排期 (导出汇报)
                <span class="ml-auto text-[10px] bg-red-100 text-red-600 px-1.5 py-0.5 rounded font-black group-hover:scale-110 transition-transform">防学车</span>
            </button>
        </nav>
        <div class="p-5 border-t border-slate-200">
            <button id="btn-add" class="w-full bg-slate-900 text-white px-4 py-3 rounded-xl text-sm font-bold shadow-md hover:bg-slate-800 transition-colors">
                + 录入新计划
            </button>
        </div>
    </aside>

    <main class="flex-1 relative bg-slate-50 h-full overflow-hidden">
        
        <section id="view-calendar" class="h-full flex flex-col">
            <div class="bg-white px-8 py-4 border-b border-slate-200 flex items-center justify-between">
                <div>
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider">Today / 今日任务</h2>
                    <div id="today-tasks" class="text-lg font-black text-slate-800 mt-1">今天有 1场比赛, 2项补题待完成</div>
                </div>
                <div class="flex items-center gap-4">
                    <button id="prev-month" class="p-2 hover:bg-slate-100 rounded-lg font-bold">&lt;</button>
                    <span id="month-label" class="font-black text-xl w-32 text-center">2026 3月</span>
                    <button id="next-month" class="p-2 hover:bg-slate-100 rounded-lg font-bold">&gt;</button>
                </div>
            </div>
            
            <div class="grid grid-cols-7 border-b border-slate-200 text-center text-xs font-bold text-slate-400 py-2 bg-white uppercase">
                <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div class="text-blue-400">六</div><div class="text-blue-400">日</div>
            </div>
            <div id="calendar-grid" class="flex-1 grid grid-cols-7 auto-rows-fr overflow-y-auto bg-slate-100 gap-[1px]">
                </div>
        </section>

        <section id="view-report" class="h-full hidden flex-col bg-white overflow-y-auto p-10">
            <div class="max-w-5xl mx-auto w-full">
                <header class="mb-10 flex justify-between items-end border-b border-slate-200 pb-6">
                    <div>
                        <h2 class="text-3xl font-black text-slate-900 tracking-tight">2026 核心训练与赛事排期表</h2>
                        <p class="text-sm text-slate-500 mt-2">高强度备战阶段，时间紧凑，无额外空档安排其他事宜。</p>
                    </div>
                    <button class="px-4 py-2 border-2 border-slate-200 text-slate-600 font-bold rounded-lg text-sm bg-slate-50 pointer-events-none">
                        打印排期单
                    </button>
                </header>

                <div class="grid grid-cols-2 gap-16">
                    
                    <div>
                        <div class="flex items-center gap-3 mb-6 bg-blue-50 p-3 rounded-xl border border-blue-100">
                            <span class="text-2xl">🏆</span>
                            <div>
                                <h3 class="font-black text-blue-900 text-lg">重大赛事排期</h3>
                                <p id="report-match-count" class="text-xs text-blue-600 font-bold">已定档 0 场</p>
                            </div>
                        </div>
                        <div class="pl-4 border-l-2 border-blue-200 space-y-6 relative" id="report-matches">
                            </div>
                    </div>

                    <div>
                        <div class="flex items-center gap-3 mb-6 bg-slate-100 p-3 rounded-xl border border-slate-200">
                            <span class="text-2xl">💻</span>
                            <div>
                                <h3 class="font-black text-slate-800 text-lg">高强度算法集训</h3>
                                <p id="report-daily-count" class="text-xs text-slate-500 font-bold">待攻克 0 项</p>
                            </div>
                        </div>
                        <div class="pl-4 border-l-2 border-slate-200 space-y-6 relative" id="report-dailies">
                            </div>
                    </div>

                </div>
            </div>
        </section>

    </main>

    <div id="modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-white w-full max-w-xl rounded-2xl shadow-2xl p-6">
            <h3 class="font-black text-lg mb-4">快捷录入</h3>
            <input type="text" id="input-text" placeholder="例: 3.29 19~21 牛客周赛 (含'补题/刷题'归为日常)" class="w-full text-lg p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 font-bold">
            <div class="mt-4 flex justify-end gap-3">
                <button id="btn-cancel" class="px-5 py-2.5 text-slate-500 font-bold hover:bg-slate-100 rounded-xl">取消</button>
                <button id="btn-save" class="px-5 py-2.5 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700">保存 (Enter)</button>
            </div>
        </div>
    </div>

    <script>
        // --- 核心数据 ---
        let events = [
            { id: 1, date: '2026-03-29', title: '牛客周赛 #12', start: '19:00', end: '21:00', type: 'match', level: 'P1' },
            { id: 2, date: '2026-04-12', title: '蓝桥杯省赛', start: '09:00', end: '13:00', type: 'match', level: 'P0' },
            { id: 3, date: '2026-03-27', title: '补题: 状压DP专题', type: 'daily' },
            { id: 4, date: '2026-03-28', title: '刷题: Codeforces Div2', type: 'daily' },
            { id: 5, date: '2026-04-05', title: '校队线下集训', start: '14:00', end: '18:00', type: 'match', level: 'P0' }
        ];

        let curDate = new Date(2026, 2, 1);
        const todayStr = new Date().toISOString().split('T')[0]; // 实际的今天

        // --- DOM 获取 ---
        const navCal = document.getElementById('nav-calendar');
        const navRep = document.getElementById('nav-report');
        const viewCal = document.getElementById('view-calendar');
        const viewRep = document.getElementById('view-report');
        
        // --- 视图切换逻辑 ---
        navCal.onclick = () => {
            viewCal.classList.remove('hidden'); viewRep.classList.add('hidden');
            navCal.className = 'w-full flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 rounded-xl text-sm font-bold transition-all';
            navRep.className = 'w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-bold transition-all group';
            renderCalendar();
        };
        navRep.onclick = () => {
            viewRep.classList.remove('hidden'); viewRep.classList.add('flex'); viewCal.classList.add('hidden');
            navRep.className = 'w-full flex items-center gap-3 px-4 py-3 bg-slate-100 text-slate-900 rounded-xl text-sm font-bold transition-all group';
            navCal.className = 'w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-bold transition-all';
            renderReport();
        };

        // --- 渲染日历模式 (模式一) ---
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const year = curDate.getFullYear(), month = curDate.getMonth();
            document.getElementById('month-label').textContent = `${year}年 ${month + 1}月`;

            let firstDay = new Date(year, month, 1).getDay();
            firstDay = firstDay === 0 ? 7 : firstDay; 
            const days = new Date(year, month + 1, 0).getDate();

            // 填充今日任务高亮栏
            const todayEvents = events.filter(e => e.date === todayStr);
            const matches = todayEvents.filter(e => e.type === 'match').length;
            const dailies = todayEvents.filter(e => e.type === 'daily').length;
            document.getElementById('today-tasks').textContent = 
                todayEvents.length ? `今天有 ${matches} 场比赛安排，${dailies} 项刷题/补题任务。` : `今天暂无安排，建议休息或自由刷题。`;

            for (let i = 1; i < firstDay; i++) grid.innerHTML += `<div class="bg-slate-50/50"></div>`;

            for (let i = 1; i <= days; i++) {
                const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const evts = events.filter(e => e.date === dStr).sort((a,b) => (a.start||'').localeCompare(b.start||''));
                
                let html = evts.map(e => {
                    const isMatch = e.type === 'match';
                    return `<div class="text-[11px] px-1.5 py-1 mb-1 rounded border-l-4 font-bold truncate 
                        ${isMatch ? 'bg-blue-50 border-blue-500 text-blue-800' : 'bg-slate-100 border-slate-400 text-slate-700'}">
                        ${e.start ? e.start+' ' : ''}${e.title}
                    </div>`;
                }).join('');

                const isToday = dStr === todayStr;
                grid.innerHTML += `
                    <div class="bg-white p-2 border-r border-b border-slate-100 min-h-[100px]">
                        <div class="text-sm font-black mb-1 ${isToday ? 'text-blue-600' : 'text-slate-400'}">${i}</div>
                        ${html}
                    </div>`;
            }
        }

        // --- 渲染汇报模式 (模式二：给老爸看的双列) ---
        function renderReport() {
            // 将所有日程按时间排序
            const sortedEvents = [...events].sort((a,b) => a.date.localeCompare(b.date));
            const matchEvents = sortedEvents.filter(e => e.type === 'match');
            const dailyEvents = sortedEvents.filter(e => e.type === 'daily');

            document.getElementById('report-match-count').textContent = `已定档 ${matchEvents.length} 场`;
            document.getElementById('report-daily-count').textContent = `待攻克 ${dailyEvents.length} 项`;

            // 渲染左侧比赛轴
            document.getElementById('report-matches').innerHTML = matchEvents.map(e => `
                <div class="timeline-dot relative">
                    <style>.timeline-dot:nth-child(${matchEvents.indexOf(e)+1})::before { background-color: #3b82f6; }</style>
                    <div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm">
                        <div class="text-blue-600 font-black text-sm mb-1">${e.date} ${e.start ? e.start+'-'+e.end : ''}</div>
                        <div class="text-slate-900 font-bold text-lg">${e.title}</div>
                        ${e.level === 'P0' ? '<span class="inline-block mt-2 text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded font-black">重点赛事/不可缺席</span>' : ''}
                    </div>
                </div>
            `).join('');

            // 渲染右侧刷题轴
            document.getElementById('report-dailies').innerHTML = dailyEvents.map(e => `
                <div class="timeline-dot relative">
                    <style>.timeline-dot:nth-child(${dailyEvents.indexOf(e)+1})::before { background-color: #94a3b8; }</style>
                    <div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm">
                        <div class="text-slate-500 font-black text-sm mb-1">${e.date}</div>
                        <div class="text-slate-700 font-bold text-base">${e.title}</div>
                    </div>
                </div>
            `).join('');
        }

        // --- 基础交互 ---
        document.getElementById('prev-month').onclick = () => { curDate.setMonth(curDate.getMonth()-1); renderCalendar(); };
        document.getElementById('next-month').onclick = () => { curDate.setMonth(curDate.getMonth()+1); renderCalendar(); };
        
        // 录入功能
        const modal = document.getElementById('modal');
        const input = document.getElementById('input-text');
        
        const openModal = () => { modal.classList.remove('hidden'); modal.classList.add('flex'); input.value = ''; input.focus(); };
        const closeModal = () => { modal.classList.add('hidden'); modal.classList.remove('flex'); };
        
        document.getElementById('btn-add').onclick = openModal;
        document.getElementById('btn-cancel').onclick = closeModal;

        // 极简解析并保存
        const saveEvent = () => {
            const text = input.value.trim();
            if(!text) return;
            
            let date = todayStr, start = '', end = '', title = text, type = 'match';
            
            const dateMatch = text.match(/(\d{1,2})[\.\-](\d{1,2})/);
            if(dateMatch) {
                date = `${curDate.getFullYear()}-${String(dateMatch[1]).padStart(2,'0')}-${String(dateMatch[2]).padStart(2,'0')}`;
                title = title.replace(dateMatch[0], '');
            }
            
            const timeMatch = text.match(/(\d{1,2})\s*[~\-]\s*(\d{1,2})/);
            if(timeMatch) {
                start = `${timeMatch[1].padStart(2,'0')}:00`; end = `${timeMatch[2].padStart(2,'0')}:00`;
                title = title.replace(timeMatch[0], '');
            }

            if(title.includes('补题') || title.includes('刷题') || title.includes('日常')) type = 'daily';
            
            events.push({ id: Date.now(), date, start, end, title: title.trim(), type });
            
            renderCalendar();
            if(!viewRep.classList.contains('hidden')) renderReport(); // 如果在汇报模式就刷新汇报模式
            closeModal();
        };

        document.getElementById('btn-save').onclick = saveEvent;
        input.onkeydown = (e) => { if(e.key === 'Enter') saveEvent(); };
        window.onkeydown = (e) => { 
            if((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openModal(); }
            if(e.key === 'Escape') closeModal();
        };

        // 初始渲染
        renderCalendar();
    </script>
</body>
</html>
