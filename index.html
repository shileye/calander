<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACMer 专属赛事日历 | Professional & Advanced</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        // 自定义 Tailwind 配置，打造专业色调
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        geek: {
                            bg: '#fbfcfd',       // 极白背景
                            panel: '#ffffff',    // 纯白面板
                            border: '#e6e8eb',   // 极淡边框
                            text: '#111827',     // 深邃黑
                            sub: '#6b7280',      // 辅助灰
                            primary: '#3b82f6',  // 专业蓝 (P1)
                            urgent: '#ef4444',   // 紧迫红 (P0)
                            daily: '#6b7280',    // 日常灰 (P2)
                        }
                    },
                    boxShadow: {
                        'premium': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                        'panel': '0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.05)'
                    }
                }
            }
        }
    </script>
    <style>
        /* 极致简约的滚动条 */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        
        /* 页面基础样式 */
        body { font-feature-settings: "cv02", "cv03", "cv04", "cv11"; }
        .transition-standard { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); }
    </style>
</head>
<body class="bg-geek-bg text-geek-text font-sans antialiased selection:bg-geek-primary/10 h-screen flex flex-col overflow-hidden">
    <div id="app" class="flex flex-1 overflow-hidden">
        
        <aside class="w-64 bg-geek-panel border-r border-geek-border flex flex-col shadow-inner z-10">
            <div class="p-6">
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-geek-primary"></span>
                    <h1 class="text-xl font-extrabold tracking-tight text-geek-text">
                        <span class="font-light">ACM</span> Calendar
                    </h1>
                </div>
                <p class="text-xs text-geek-sub mt-1.5 font-mono tracking-widest uppercase">Stay code, No life.</p>
            </div>
            
            <nav class="flex-1 px-4 space-y-1.5">
                <a href="#" class="flex items-center gap-3.5 px-4 py-2.5 bg-geek-primary/5 text-geek-primary rounded-lg font-semibold transition-standard shadow-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 002-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    月度赛事
                </a>
                <a href="#" class="flex items-center gap-3.5 px-4 py-2.5 text-geek-sub hover:bg-geek-border/40 hover:text-geek-text rounded-lg transition-standard group">
                    <svg class="w-5 h-5 text-geek-sub group-hover:text-geek-primary transition-standard" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                    年度热力图
                    <span class="ml-auto text-xs px-2 py-0.5 rounded bg-geek-urgent text-white font-bold transition-standard group-hover:scale-105">护盾</span>
                </a>
            </nav>

            <div class="p-6 border-t border-geek-border">
                <button @click="showModal = true" class="w-full flex items-center justify-center gap-2.5 bg-geek-text hover:bg-geek-text/90 text-white px-5 py-3 rounded-xl shadow-panel transition-standard font-semibold text-sm">
                    <span>+ 录入新日程</span>
                    <kbd class="hidden sm:inline-block bg-geek-text/70 text-geek-panel px-2 py-0.5 rounded text-[11px] font-mono tracking-wider">Ctrl+K</kbd>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-geek-bg">
            <header class="h-20 border-b border-geek-border flex items-center justify-between px-10 bg-geek-panel/90 backdrop-blur-sm z-10 shadow-premium">
                <div class="flex items-center gap-5 text-xl font-bold text-geek-text">
                    <button class="w-9 h-9 flex items-center justify-center rounded-lg border border-geek-border text-geek-sub hover:border-geek-primary hover:text-geek-primary transition-standard hover:shadow-sm">&lt;</button>
                    <span class="font-mono tracking-tight">2026年 3月</span>
                    <button class="w-9 h-9 flex items-center justify-center rounded-lg border border-geek-border text-geek-sub hover:border-geek-primary hover:text-geek-primary transition-standard hover:shadow-sm">&gt;</button>
                </div>
                <div class="flex items-center gap-6 text-sm text-geek-sub font-medium border border-geek-border px-6 py-2.5 rounded-full bg-geek-panel">
                    <span class="flex items-center gap-2.5"><span class="w-3 h-3 rounded bg-geek-urgent"></span> 必打 (P0)</span>
                    <span class="flex items-center gap-2.5"><span class="w-3 h-3 rounded bg-geek-primary"></span> 常规 (P1)</span>
                    <span class="flex items-center gap-2.5"><span class="w-3 h-3 rounded bg-geek-daily"></span> 日常 (P2)</span>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-10">
                <div class="grid grid-cols-7 gap-5 mb-6 text-center text-xs font-bold text-geek-sub uppercase tracking-wider font-mono">
                    <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
                </div>
                
                <div class="grid grid-cols-7 gap-5 auto-rows-[minmax(140px,auto)]">
                    
                    <div class="bg-geek-border/30 border border-dashed border-geek-border/60 rounded-2xl"></div>
                    <div class="bg-geek-border/30 border border-dashed border-geek-border/60 rounded-2xl"></div>
                    <div class="bg-geek-border/30 border border-dashed border-geek-border/60 rounded-2xl"></div>
                    <div class="bg-geek-border/30 border border-dashed border-geek-border/60 rounded-2xl"></div>
                    
                    <div class="bg-geek-panel border border-geek-border rounded-2xl p-4 shadow-sm hover:border-geek-primary transition-standard hover:-translate-y-1">
                        <div class="text-sm font-mono font-bold text-geek-sub mb-3">27</div>
                        <div class="flex items-center gap-1.5 text-xs text-geek-daily mb-2 group">
                            <span class="w-1.5 h-1.5 rounded-full bg-geek-daily group-hover:scale-125 transition-standard"></span>
                            <span>补题: 动态规划</span>
                        </div>
                    </div>
                    
                    <div class="bg-geek-panel border border-geek-border rounded-2xl p-4 shadow-sm hover:border-geek-primary transition-standard hover:-translate-y-1 hover:bg-geek-daily/5">
                        <div class="text-sm font-mono font-bold text-geek-sub mb-3 group-hover:text-geek-text">28</div>
                        <p class="text-[11px] text-geek-sub">无赛事安排</p>
                    </div>

                    <div class="bg-geek-panel border border-geek-primary rounded-2xl p-4 shadow-premium relative transition-standard hover:-translate-y-1">
                        <div class="text-sm font-mono font-bold text-geek-primary mb-3">29</div>
                        
                        <div class="text-xs p-3 mb-2.5 rounded-lg border-l-4 border-geek-primary bg-geek-primary/5 shadow-inner hover:shadow-md transition-standard cursor-pointer">
                            <div class="flex justify-between items-start gap-1">
                                <span class="font-bold text-geek-text tracking-tight truncate">牛客周赛 #12</span>
                                <span class="text-[10px] text-geek-primary font-bold px-1.5 py-0.5 rounded bg-geek-panel border border-geek-primary/30 whitespace-nowrap">线上赛</span>
                            </div>
                            <span class="text-[10px] font-mono text-geek-sub mt-1 block">21:00 - 23:00 (2h)</span>
                        </div>

                        <div class="text-xs p-3 rounded-lg border-l-4 border-geek-urgent bg-geek-urgent/5 shadow-inner hover:shadow-md transition-standard cursor-pointer">
                            <div class="flex justify-between items-start gap-1">
                                <span class="font-bold text-geek-text tracking-tight truncate">蓝桥杯校选</span>
                                <span class="text-[10px] text-geek-urgent font-bold px-1.5 py-0.5 rounded bg-geek-panel border border-geek-urgent/30 whitespace-nowrap">线下赛</span>
                            </div>
                            <span class="text-[10px] font-mono text-geek-sub mt-1 block">14:00 - 18:00 (4h)</span>
                        </div>
                    </div>

                </div>
            </div>
        </main>

        <transition enter-active-class="ease-out duration-300" enter-from-class="opacity-0 scale-95" enter-to-class="opacity-100 scale-100" leave-active-class="ease-in duration-200" leave-from-class="opacity-100 scale-100" leave-to-class="opacity-0 scale-95">
            <div v-if="showModal" class="fixed inset-0 z-50 flex items-start justify-center pt-32 bg-geek-text/30 backdrop-blur-sm" @click.self="showModal = false">
                <div class="glass-panel w-full max-w-3xl rounded-3xl shadow-panel border border-geek-border/50 p-1 overflow-hidden transition-standard">
                    <div class="bg-geek-panel rounded-[20px] overflow-hidden">
                        
                        <div class="p-6 border-b border-geek-border flex items-center gap-4 bg-geek-panel">
                            <svg class="w-7 h-7 text-geek-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <input type="text" autofocus placeholder="输入如“3.29晚上9点到11点牛客周赛”或 Ctrl+K..." class="w-full text-lg outline-none text-geek-text placeholder-geek-sub bg-transparent font-medium">
                            <div class="flex items-center gap-2">
                                <kbd class="bg-geek-border text-geek-sub px-2 py-1 rounded-md text-[11px] font-mono shadow-inner">Enter</kbd>
                                <kbd @click="showModal = false" class="bg-geek-border text-geek-sub px-2 py-1 rounded-md text-[11px] font-mono shadow-inner cursor-pointer hover:bg-geek-urgent/10 hover:text-geek-urgent">Esc</kbd>
                            </div>
                        </div>
                        
                        <div class="p-5 bg-geek-bg grid grid-cols-2 gap-4 text-sm border-b border-geek-border">
                            <div class="flex items-center gap-3">
                                <label class="text-geek-sub font-medium">优先级:</label>
                                <div class="flex gap-1.5">
                                    <button class="px-3 py-1.5 rounded-lg border border-geek-urgent bg-geek-panel text-geek-urgent font-semibold text-xs transition-standard hover:shadow-inner">P0</button>
                                    <button class="px-3 py-1.5 rounded-lg border border-geek-primary bg-geek-panel text-geek-primary font-semibold text-xs transition-standard hover:shadow-inner hover:bg-geek-primary/5">P1</button>
                                    <button class="px-3 py-1.5 rounded-lg border border-geek-border bg-geek-panel text-geek-sub font-semibold text-xs transition-standard hover:shadow-inner hover:border-geek-daily/50">P2</button>
                                </div>
                            </div>
                            <div class="flex items-center gap-3">
                                <label class="text-geek-sub font-medium">类型:</label>
                                <div class="flex gap-1.5">
                                    <button class="px-3 py-1.5 rounded-lg border border-geek-border bg-geek-panel text-geek-text text-xs transition-standard hover:shadow-inner hover:border-geek-primary/50">线上赛</button>
                                    <button class="px-3 py-1.5 rounded-lg border border-geek-border bg-geek-panel text-geek-text text-xs transition-standard hover:shadow-inner hover:border-geek-primary/50">线下赛</button>
                                    <button class="px-3 py-1.5 rounded-lg border border-geek-border bg-geek-panel text-geek-text text-xs transition-standard hover:shadow-inner hover:border-geek-primary/50">其他计划</button>
                                </div>
                            </div>
                        </div>

                        <div class="p-5 text-xs text-geek-sub flex items-center gap-4 bg-geek-bg/50">
                            <svg class="w-4 h-4 text-geek-daily" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <span>智能解析预判:</span>
                            <span class="bg-geek-panel px-2.5 py-1 rounded border border-geek-border shadow-inner font-mono">📅 2026-03-29</span>
                            <span class="bg-geek-panel px-2.5 py-1 rounded border border-geek-border shadow-inner font-mono">⏱️ 21:00-23:00 (2.0h)</span>
                        </div>
                    </div>
                </div>
            </div>
        </transition>

    </div>

    <script>
        const { createApp, ref } = Vue
        createApp({
            setup() {
                // 控制命令面板的显示
                const showModal = ref(false)
                
                // 监听全局快捷键 Ctrl+K (Mac下也兼容 meta+K)
                window.addEventListener('keydown', (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
                        e.preventDefault()
                        showModal.value = !showModal.value
                    }
                    // 按下 Esc 键关闭
                    if (e.key === 'Escape' && showModal.value) {
                        showModal.value = false
                    }
                })

                return { showModal }
            }
        }).mount('#app')
    </script>
</body>
</html>
