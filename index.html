<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACMer Pro Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 针对移动端底部导航防遮挡 */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="theme-bg-base theme-text-main font-sans h-screen flex flex-col md:flex-row overflow-hidden transition-colors duration-300">
    
    <!-- 左侧导航 (PC端) -->
    <aside class="hidden md:flex w-64 theme-bg-panel border-r theme-border flex-col z-10 transition-colors duration-300">
        <div class="p-6 pb-4">
            <h1 class="text-xl font-black tracking-tight flex items-center gap-2">
                <span class="w-3 h-3 bg-blue-500 rounded-sm"></span>ACM Pro
            </h1>
        </div>
        <nav class="flex-1 px-4 space-y-1 mt-4">
            <button class="nav-btn active w-full flex items-center px-4 py-2.5 rounded-lg text-sm font-bold transition-colors" data-view="month">📅 月度视图</button>
            <button class="nav-btn w-full flex items-center px-4 py-2.5 rounded-lg text-sm font-bold transition-colors opacity-70 hover:opacity-100" data-view="week">⚡️ 周度排期</button>
            <button class="nav-btn w-full flex items-center px-4 py-2.5 rounded-lg text-sm font-bold transition-colors opacity-70 hover:opacity-100" data-view="year">🟩 年度热力图</button>
        </nav>
        
        <div class="p-4 border-t theme-border flex flex-col gap-2">
            <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1 px-1">Data & Sync</div>
            <div class="flex gap-2">
                <button id="btn-export-json" class="flex-1 bg-black/5 hover:bg-black/10 text-xs font-bold py-2 rounded-lg transition-colors">⬇️ 备份</button>
                <label class="flex-1 bg-black/5 hover:bg-black/10 text-xs font-bold py-2 rounded-lg transition-colors cursor-pointer text-center">
                    ⬆️ 恢复<input type="file" id="input-import-json" class="hidden" accept=".json">
                </label>
            </div>
            <button id="btn-export-ics" class="w-full bg-blue-500/10 text-blue-600 hover:bg-blue-500/20 text-xs font-bold py-2 rounded-lg transition-colors border border-blue-500/20">
                📲 导出至系统日历
            </button>
        </div>

        <div class="p-5 border-t theme-border">
            <button class="btn-global-add w-full bg-blue-600 text-white px-4 py-3 rounded-lg text-sm font-bold shadow-md hover:bg-blue-700 transition-colors flex justify-between items-center">
                <span>录入日程</span>
                <kbd class="font-mono text-[10px] bg-blue-800 px-1.5 py-0.5 rounded hidden lg:inline-block">Ctrl+K</kbd>
            </button>
        </div>
    </aside>

    <!-- 右侧主体 -->
    <main class="flex-1 relative flex flex-col h-full overflow-hidden pb-16 md:pb-0">
        <header class="px-4 md:px-8 py-3 md:py-4 border-b theme-border flex justify-between items-center theme-bg-panel transition-colors duration-300 z-20 shadow-sm md:shadow-none">
            <div class="flex items-center gap-1 md:gap-4">
                <button id="btn-prev" class="p-1.5 md:p-1 hover:bg-gray-500/10 rounded transition-colors">&lt;</button>
                <span id="date-label" class="font-black text-sm md:text-lg w-24 md:w-48 text-center tabular-nums tracking-tight">--</span>
                <button id="btn-next" class="p-1.5 md:p-1 hover:bg-gray-500/10 rounded transition-colors">&gt;</button>
                <button id="btn-today" class="ml-1 md:ml-2 text-[10px] md:text-xs border theme-border px-2 md:px-3 py-1 md:py-1.5 rounded-md font-bold hover:bg-gray-500/10 transition-colors">今天</button>
            </div>
            
            <div class="flex items-center gap-2 md:gap-4">
                <button id="btn-fetch-api" class="text-xs md:text-sm font-bold bg-purple-500/10 text-purple-600 border border-purple-500/30 px-2.5 py-1.5 rounded-lg hover:bg-purple-500/20 transition-colors flex items-center gap-1 shadow-sm">
                    <span>🌐</span> <span class="hidden md:inline">抓取近期比赛</span>
                </button>
                
                <div class="flex items-center gap-1 bg-gray-500/5 p-1 rounded-lg border theme-border hidden md:flex">
                    <button class="theme-btn w-6 h-6 md:w-8 md:h-8 rounded flex items-center justify-center text-xs md:text-sm active" data-set="light">☀️</button>
                    <button class="theme-btn w-6 h-6 md:w-8 md:h-8 rounded flex items-center justify-center text-xs md:text-sm opacity-50" data-set="dark">🌙</button>
                    <button class="theme-btn w-6 h-6 md:w-8 md:h-8 rounded flex items-center justify-center text-xs md:text-sm opacity-50" data-set="nature">🌿</button>
                </div>
            </div>
        </header>
        
        <div class="flex-1 relative overflow-hidden">
            <div id="view-month" class="view-section h-full flex flex-col">
                <div class="grid grid-cols-7 border-b theme-border text-center text-[10px] md:text-xs font-bold py-2 opacity-60 uppercase tracking-wider">
                    <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div class="text-blue-500">六</div><div class="text-blue-500">日</div>
                </div>
                <div id="month-grid" class="flex-1 grid grid-cols-7 auto-rows-fr overflow-y-auto theme-bg-grid gap-px pb-6 md:pb-0"></div>
            </div>
            <div id="view-week" class="view-section h-full hidden flex-col p-4 md:p-8 overflow-y-auto bg-black/5">
                <h2 class="text-lg md:text-2xl font-black mb-4 md:mb-6">本周详细排期</h2>
                <div id="week-grid" class="flex flex-col gap-3 max-w-5xl mx-auto w-full pb-10"></div>
            </div>
            <div id="view-year" class="view-section h-full hidden flex-col p-4 md:p-8 overflow-y-auto items-center">
                <h2 class="text-lg md:text-2xl font-black mb-2 self-start w-full max-w-4xl mx-auto">训练热力图</h2>
                <div id="year-grid" class="flex flex-wrap gap-1 md:gap-1.5 max-w-4xl mx-auto mt-4 md:mt-8 bg-black/5 p-4 md:p-6 rounded-xl border theme-border pb-10"></div>
            </div>
        </div>
    </main>

    <!-- 底部导航 (移动端) -->
    <nav class="md:hidden fixed bottom-0 w-full theme-bg-panel border-t theme-border flex justify-around items-center p-2 z-30 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] env(safe-area-inset-bottom)">
        <button class="nav-btn active flex flex-col items-center p-2 opacity-100" data-view="month"><span class="text-lg mb-1">📅</span><span class="text-[10px] font-bold">月历</span></button>
        <button class="nav-btn flex flex-col items-center p-2 opacity-50" data-view="week"><span class="text-lg mb-1">⚡️</span><span class="text-[10px] font-bold">周排期</span></button>
        <button class="btn-global-add flex flex-col items-center p-2 transform -translate-y-4">
            <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white text-2xl shadow-lg shadow-blue-500/40 border-4 border-white">+</div>
        </button>
        <button class="nav-btn flex flex-col items-center p-2 opacity-50" data-view="year"><span class="text-lg mb-1">🟩</span><span class="text-[10px] font-bold">热力图</span></button>
        <button id="mobile-theme-toggle" class="flex flex-col items-center p-2 opacity-50"><span class="text-lg mb-1">🌙</span><span class="text-[10px] font-bold">主题</span></button>
    </nav>

    <!-- 抽屉 (Drawer) -->
    <div id="drawer-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300"></div>
    <div id="right-drawer" class="fixed top-0 right-0 h-full w-full md:w-96 theme-bg-panel shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col border-l theme-border">
        <div class="p-4 md:p-6 border-b theme-border flex justify-between items-center bg-black/5">
            <h3 id="drawer-date" class="text-lg md:text-xl font-black tabular-nums">--</h3>
            <button id="btn-close-drawer" class="text-3xl opacity-50 hover:opacity-100 p-2">&times;</button>
        </div>
        <div id="drawer-list" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-3"></div>
        <div class="p-4 md:p-5 border-t theme-border bg-black/5 flex flex-col gap-3 pb-safe">
            <div class="flex gap-1 md:gap-2 text-[10px] md:text-xs font-bold" id="drawer-type-btns">
                <button class="type-btn flex-1 py-2 md:py-1.5 rounded border-2 border-blue-500 text-blue-600 bg-blue-500/10" data-type="match">🏆线上</button>
                <button class="type-btn flex-1 py-2 md:py-1.5 rounded border-2 border-transparent opacity-50" data-type="offline">🚗线下</button>
                <button class="type-btn flex-1 py-2 md:py-1.5 rounded border-2 border-transparent opacity-50" data-type="upsolve">🔥补题</button>
                <button class="type-btn flex-1 py-2 md:py-1.5 rounded border-2 border-transparent opacity-50" data-type="practice">💻刷题</button>
            </div>
            <input type="text" id="drawer-input" placeholder="输入名称与时间 (例: 19:00 牛客)" class="w-full bg-transparent border theme-border rounded-lg px-4 py-3 outline-none focus:border-blue-500 font-bold">
        </div>
    </div>

    <!-- 全局录入 Modal -->
    <div id="global-modal" class="fixed inset-0 bg-black/60 backdrop-blur-md z-50 hidden opacity-0 transition-opacity duration-200 flex items-start justify-center pt-20 md:pt-32 px-4">
        <div class="theme-bg-panel w-full max-w-2xl rounded-2xl shadow-2xl border theme-border overflow-hidden transform scale-95 transition-transform duration-200" id="global-modal-content">
            <div class="p-4 md:p-6 pb-2">
                <input type="text" id="global-input" placeholder="格式: 3.29 19~21 牛客周赛" class="w-full text-lg md:text-xl bg-transparent outline-none font-black placeholder-gray-400">
            </div>
            <div class="px-4 md:px-6 py-4 border-t theme-border bg-black/5 flex flex-col md:flex-row justify-between items-center text-sm font-bold mt-2 gap-4">
                <div class="flex w-full md:w-auto gap-1 md:gap-2 text-[10px] md:text-xs" id="modal-type-btns">
                    <button class="type-btn flex-1 md:flex-none px-2 md:px-3 py-2 md:py-1.5 rounded border-2 border-blue-500 text-blue-600 bg-blue-500/10" data-type="match">🏆线上</button>
                    <button class="type-btn flex-1 md:flex-none px-2 md:px-3 py-2 md:py-1.5 rounded border-2 border-transparent opacity-50" data-type="offline">🚗线下</button>
                    <button class="type-btn flex-1 md:flex-none px-2 md:px-3 py-2 md:py-1.5 rounded border-2 border-transparent opacity-50" data-type="upsolve">🔥补题</button>
                    <button class="type-btn flex-1 md:flex-none px-2 md:px-3 py-2 md:py-1.5 rounded border-2 border-transparent opacity-50" data-type="practice">💻日常</button>
                </div>
                <div class="flex w-full md:w-auto gap-2">
                    <button id="btn-modal-cancel" class="flex-1 md:flex-none px-4 py-3 md:py-2 opacity-60 bg-gray-500/10 rounded-lg">取消</button>
                    <button id="btn-modal-save" class="flex-1 md:flex-none px-4 py-3 md:py-2 bg-blue-600 text-white rounded-lg shadow-md">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增：API 抓取结果筛选 Modal -->
    <div id="api-modal" class="fixed inset-0 bg-black/60 backdrop-blur-md z-50 hidden opacity-0 transition-opacity duration-200 flex items-center justify-center p-4">
        <div class="theme-bg-panel w-full max-w-2xl rounded-2xl shadow-2xl border theme-border overflow-hidden transform scale-95 transition-transform duration-200 flex flex-col max-h-[85vh]" id="api-modal-content">
            <div class="p-4 md:p-6 border-b theme-border bg-black/5 flex justify-between items-center">
                <h3 class="font-black text-lg flex items-center gap-2"><span>🌐</span> 未来一周赛事 (CF/At/牛客)</h3>
                <button id="btn-close-api" class="text-2xl opacity-50 hover:opacity-100">&times;</button>
            </div>
            <div id="api-list" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-3">
                <!-- 动态注入待选赛事 -->
            </div>
            <div class="p-4 md:p-6 border-t theme-border bg-black/5 flex justify-end gap-3">
                <button id="btn-api-cancel" class="px-5 py-2.5 opacity-60 bg-gray-500/10 hover:bg-gray-500/20 rounded-lg font-bold transition-colors text-sm">取消</button>
                <button id="btn-api-confirm" class="px-5 py-2.5 bg-purple-600 text-white rounded-lg shadow-md font-bold hover:bg-purple-700 transition-colors text-sm">导入选中的赛事</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
