<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWAKE | ACMer 指挥中心</title>
    <!-- 引入极简图标库 -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- 引入外部 CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 左侧指挥台 -->
    <aside class="sidebar">
        <div class="brand">AWAKE<span>_</span>OS</div>
        
        <div class="nav-section">
            <div class="nav-title">全局视角</div>
            <div class="nav-item active" data-target="timeline"><i class="ri-list-check-3"></i> 战役时间轴</div>
            <div class="nav-item" data-target="calendar"><i class="ri-calendar-2-line"></i> 战略大盘</div>
        </div>

        <div class="nav-section">
            <div class="nav-title">数据雷达</div>
            <div class="stats-box border-comp">
                <div class="stats-val" id="stat-comp">0</div>
                <div class="stats-label"><i class="ri-sword-line"></i> 场待打硬仗</div>
            </div>
            <div class="stats-box border-train">
                <div class="stats-val" id="stat-train">0</div>
                <div class="stats-label"><i class="ri-code-box-line"></i> 项修炼计划</div>
            </div>
            <div class="stats-box border-exam">
                <div class="stats-val" id="stat-exam">0</div>
                <div class="stats-label"><i class="ri-book-open-line"></i> 考研/复习节点</div>
            </div>
        </div>
        
        <div class="quote-box" id="daily-quote">
            "键盘敲碎之日，便是金牌加身之时。"
        </div>
    </aside>

    <!-- 右侧核心作战区 -->
    <main class="main-content">
        <!-- 极客终端录入区 -->
        <header class="terminal-header">
            <div class="terminal-wrapper">
                <i class="ri-command-line"></i>
                <input type="text" id="magic-input" placeholder="输入指令部署战役 (如: 4.11 19:00 蓝桥杯省赛 #比赛 !0) 回车执行..." autocomplete="off">
            </div>
            <div class="terminal-hints">
                标签支持: <span>#比赛</span> <span>#训练</span> <span>#考研</span> | 优先级: <span>!0 (最高)</span> <span>!1</span> <span>!2</span>
            </div>
        </header>

        <!-- 视图 1：时间轴瀑布流 (默认显示) -->
        <section id="view-timeline" class="view-container active">
            <div class="timeline-header">
                <h2>📅 近期部署序列</h2>
            </div>
            <div id="timeline-content" class="timeline-content"></div>
        </section>

        <!-- 视图 2：日历沙盘 -->
        <section id="view-calendar" class="view-container">
            <div class="cal-header">
                <button class="cal-nav-btn" id="cal-prev"><i class="ri-arrow-left-s-line"></i></button>
                <h2 id="cal-month-title" class="cal-title">2024.04</h2>
                <button class="cal-nav-btn" id="cal-next"><i class="ri-arrow-right-s-line"></i></button>
            </div>
            <div class="cal-grid" id="cal-grid">
                <!-- JS 渲染日历网格 -->
            </div>
        </section>
    </main>

    <!-- 引入外部 JS -->
    <script src="script.js"></script>
</body>
</html>
