<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACM Calendar</title>
    <!-- 引入 Tailwind 进行基础布局排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入我们自己的样式 -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex overflow-hidden">
    
    <!-- 左侧边栏 -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col z-10">
        <div class="p-5 border-b border-gray-100">
            <h1 class="text-lg font-bold text-gray-900 tracking-tight">ACM Calendar</h1>
        </div>
        <nav class="flex-1 p-3 space-y-1">
            <a href="#" class="flex items-center gap-3 px-3 py-2 bg-blue-50 text-blue-600 rounded-md text-sm font-medium">
                月度日程
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-md text-sm transition-colors">
                年度概览
            </a>
        </nav>
        <div class="p-4 border-t border-gray-100">
            <button id="open-modal-btn" class="w-full flex items-center justify-between bg-gray-900 hover:bg-gray-800 text-white px-3 py-2 rounded-md transition-colors text-sm font-medium">
                <span>添加日程</span>
                <kbd class="text-gray-400 font-mono text-xs">Ctrl+K</kbd>
            </button>
        </div>
    </aside>

    <!-- 右侧主体 -->
    <main class="flex-1 flex flex-col h-full bg-white relative">
        <!-- 顶部操作栏 -->
        <header class="h-14 border-b border-gray-200 flex items-center justify-between px-6">
            <div class="flex items-center gap-4">
                <button id="prev-month" class="text-gray-400 hover:text-gray-900 px-2 py-1 rounded hover:bg-gray-100 transition-colors">&lt;</button>
                <h2 id="current-month-label" class="text-base font-semibold text-gray-800 w-24 text-center">2026年 3月</h2>
                <button id="next-month" class="text-gray-400 hover:text-gray-900 px-2 py-1 rounded hover:bg-gray-100 transition-colors">&gt;</button>
                <button id="today-btn" class="ml-2 text-xs border border-gray-200 px-2 py-1 rounded text-gray-600 hover:bg-gray-50">今天</button>
            </div>
            <div class="flex gap-4 text-xs text-gray-500">
                <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-red-500"></span>线下赛</span>
                <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-blue-500"></span>线上赛</span>
                <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-gray-400"></span>日常</span>
            </div>
        </header>

        <!-- 日历表头 -->
        <div class="grid grid-cols-7 border-b border-gray-200 text-center text-xs font-medium text-gray-500 py-2">
            <div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div class="text-gray-400">SAT</div><div class="text-gray-400">SUN</div>
        </div>

        <!-- 日历网格 (由 JS 动态生成) -->
        <div id="calendar-grid" class="flex-1 grid grid-cols-7 auto-rows-fr overflow-y-auto bg-gray-100 gap-px">
            <!-- 格子渲染在这里 -->
        </div>
    </main>

    <!-- 录入弹窗 -->
    <div id="input-modal" class="fixed inset-0 bg-gray-900/20 backdrop-blur-sm hidden items-start justify-center pt-32 z-50">
        <div class="bg-white w-full max-w-2xl rounded-xl shadow-2xl border border-gray-200 overflow-hidden">
            <div class="p-4 flex items-center border-b border-gray-100">
                <input type="text" id="smart-input" placeholder="输入如: 3.29 19~20 牛客周赛" class="w-full text-lg outline-none text-gray-800 placeholder-gray-400 font-medium">
            </div>
            <div class="bg-gray-50 p-3 px-4 flex justify-between items-center text-xs">
                <div id="parse-preview" class="text-gray-500 font-mono">等待输入...</div>
                <div class="flex gap-2">
                    <button id="close-modal-btn" class="px-3 py-1.5 text-gray-500 hover:bg-gray-200 rounded">取消 (Esc)</button>
                    <button id="save-event-btn" class="px-3 py-1.5 bg-blue-600 text-white hover:bg-blue-700 rounded font-medium">保存 (Enter)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入功能逻辑 -->
    <script src="app.js"></script>
</body>
</html>
